{% extends 'shop/base.html' %}

{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


<div class="container mt-4">
    <h2>🛒 Giỏ hàng</h2>

    {% for p in products %}
        <div class="border p-3 mb-2">
            <h5>{{ p.name }}</h5>
            <p>Số lượng: {{ p.qty }}</p>
            <p>Thành tiền: {{ p.total }}đ</p>
        </div>
    {% endfor %}

    <h4 class="text-danger">Tổng: {{ total }}đ</h4>

    #Tạo form đặt hàng
    <h3 class="mt-4">Thông tin đặt hàng</h3>

<form method="POST" action="/checkout/">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Tên khách" class="form-control mb-2" required>
    <input type="text" name="phone" placeholder="SĐT" class="form-control mb-2" required>
    <textarea name="address" placeholder="Địa chỉ" class="form-control mb-2" required></textarea>

    <button class="btn btn-success">Đặt hàng</button>
</form>

    <a href="/" class="btn btn-secondary">← Tiếp tục mua</a>
</div>

</body>
</html>
{% endblock %}
