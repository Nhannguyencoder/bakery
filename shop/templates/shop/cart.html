{% extends 'shop/base.html' %}

{% block content %}

<div class="row">

    <!-- GIỎ HÀNG -->
    <div class="col-md-7">
        <h3>🛒 Giỏ hàng</h3>

        <table class="table">
            <tr>
                <th>Sản phẩm</th>
                <th>Số lượng</th>
                <th>Tổng</th>
                <th></th>
            </tr>

            {% for p in products %}
            <tr>
                <td>{{ p.name }}</td>
                <td>
                    <a href="/update-cart/{{ p.id }}/decrease/" class="btn btn-sm btn-danger">-</a>
                    {{ p.qty }}
                    <a href="/update-cart/{{ p.id }}/increase/" class="btn btn-sm btn-success">+</a>
                </td>
                <td>{{ p.total }}đ</td>
                <td>
                    <a href="/remove-from-cart/{{ p.id }}/" class="btn btn-sm btn-dark">❌</a>
                </td>
            </tr>
            {% endfor %}
        </table>

        <h4 class="text-end text-danger">Tổng: {{ total }}đ</h4>
    </div>

    <!-- CHECKOUT -->
    <div class="col-md-5">
        <h3>🧾 Thông tin đặt hàng</h3>

        <form method="POST" action="/checkout/">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Tên khách hàng</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" name="phone" class="form-control" pattern="[0-9]{10}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Địa chỉ giao hàng</label>
                <textarea name="address" class="form-control" required></textarea>
            </div>

            <button class="btn btn-success w-100">
                ✅ Đặt hàng ngay
            </button>
        </form>
    </div>

</div>

{% endblock %}
