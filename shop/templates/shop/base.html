<!DOCTYPE html>
<html>
<head>
    <title>Tiệm bánh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .product-card {
        transition: 0.3s;
    }

    .product-card:hover {
        transform: translateY(-5px);
    }

    .product-img {
        height: 200px;
        object-fit: cover;
    }
    </style>

</head>

<body>

<!-- MENU -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand" href="/">🍰 Kỳ Duyên Bakery</a>

        <!-- SEARCH -->
        <form class="d-flex mx-auto" method="GET" action="/" style="width:40%;">
            <input class="form-control me-2" type="search" name="q" placeholder="Tìm bánh...">
            <button class="btn btn-warning">Search</button>
        </form>

        <!-- CART -->
        <a href="/cart/" class="btn btn-outline-light">
            🛒 Giỏ hàng ({{ cart_count }})
        </a>
    </div>
</nav>
{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-success shadow">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}
<script>
setTimeout(() => {
    document.querySelectorAll('.alert').forEach(el => {
        el.style.display = 'none';
    });
}, 2000);
</script>

<!-- NỘI DUNG -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
